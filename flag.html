<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEEELL - Flag Hero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 800vh; }
  body {
    background: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    height: 800vh;
  }
  .hero {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fff;
    z-index: 10;
  }
  #flagCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .hero-title {
    position: absolute;
    z-index: 10;
    bottom: 6vh;
    right: 6vw;
    font-weight: 900;
    font-size: clamp(40px, 6vw, 80px);
    letter-spacing: 0.12em;
    color: #1A1A1A;
    pointer-events: none;
    mix-blend-mode: multiply;
  }
  .scroll-hint {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: hintIn 1s ease-out 2s forwards;
  }
  .scroll-hint span {
    display: block;
    width: 2px; height: 40px;
    background: #1A1A1A;
    margin: 0 auto;
    animation: line 1.8s ease-in-out infinite;
    transform-origin: top;
  }
  .scroll-copy {
    position: absolute;
    z-index: 20;
    top: 45%;
    left: 0; right: 0;
    transform: translateY(-50%);
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #1A1A1A;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.06em;
  }
  @keyframes hintIn { to { opacity: 0.35; } }
  @keyframes line {
    0%   { transform: scaleY(0); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: scaleY(1); opacity: 0; }
  }
</style>
</head>
<body>

<section class="hero">
  <canvas id="flagCanvas"></canvas>
  <h1 class="hero-title">YEEELL</h1>
  <div class="scroll-hint"><span></span></div>
  <div class="scroll-copy" id="scrollCopy">「熱狂でつながる」ブランドコミュニティを創造する</div>
</section>

<script>
// ═══════════════════════════════════════════════════════
// YEEELL Hero — Parametric Floating Flag
// No physics simulation — pure trigonometric displacement
// Guarantees no folding, always stable, big beautiful waves
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('flagCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
}
resize();
window.addEventListener('resize', resize);

// ─── Scroll tracking ───
let scrollProgress = 0;
let scrollTotal = 0;
window.addEventListener('scroll', () => {
  scrollTotal = Math.min(window.scrollY / H, 6);
  scrollProgress = Math.min(scrollTotal, 1);
});

function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

// ─── Grid config ───
const COLS = 50;
const ROWS = 36;

// ─── Compute point positions parametrically ───
function getPoint(c, r, t) {
  // Flag coverage: 88% width, 80% height
  const flagW = W * 0.88;
  const flagH = H * 0.80;
  const ox = (W - flagW) / 2;
  const oy = (H - flagH) / 2;

  const baseX = ox + (c / (COLS-1)) * flagW;
  const baseY = oy + (r / (ROWS-1)) * flagH;

  // Normalized coords 0..1
  const u = c / (COLS-1);
  const v = r / (ROWS-1);

  // Edge softness: displacement is strongest at center, fades at edges
  // This prevents edges from stretching too far
  const edgeFade = Math.sin(u * Math.PI) * Math.sin(v * Math.PI);
  // But we also want edges to wave, so blend: min 0.3, max 1.0
  const fade = 0.3 + edgeFade * 0.7;

  // ─── Horizontal displacement (X) ───
  const swell = Math.sin(t * 0.0012 + v * 3.0) * 45 * fade;
  const ripple1 = Math.sin(t * 0.0022 + u * 6.0 + v * 2.5) * 30 * fade;
  const ripple2 = Math.sin(t * 0.0016 - u * 4.0 + v * 5.0) * 20 * fade;
  const driftX = Math.sin(t * 0.0005) * 30 + Math.sin(t * 0.0008 + v * 2.0) * 18;
  const ripple3 = Math.sin(t * 0.0030 + u * 8.0 + v * 3.5) * 12 * fade;

  // ─── Vertical displacement (Y) ───
  const billow = Math.sin(t * 0.0014 + u * 5.0) * 40 * fade;
  const vWave1 = Math.cos(t * 0.0020 + u * 3.5 + v * 3.0) * 25 * fade;
  const floatY = Math.sin(t * 0.0006 + u * 1.0) * 22;
  const vWave2 = Math.sin(t * 0.0026 + u * 7.0 - v * 4.0) * 14 * fade;
  const vSwell = Math.sin(t * 0.0008 - v * 3.5) * 28 * fade;

  return {
    x: baseX + swell + ripple1 + ripple2 + ripple3 + driftX,
    y: baseY + billow + vWave1 + vWave2 + vSwell + floatY
  };
}

// ─── Flag rendering with shading ───
function drawFlag(t) {
  const spacing = W * 0.75 / (COLS-1); // approx for shading calc

  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const p00 = getPoint(c, r, t);
      const p10 = getPoint(c+1, r, t);
      const p01 = getPoint(c, r+1, t);
      const p11 = getPoint(c+1, r+1, t);

      // Surface normal for shading
      const ax = p10.x - p00.x, ay = p10.y - p00.y;
      const bx = p01.x - p00.x, by = p01.y - p00.y;
      const cross = ax * by - ay * bx;
      const shade = cross / (spacing * spacing);

      const lightness = 0.78 + shade * 0.22;
      const rr = Math.min(255, Math.max(100, 245 * lightness));
      const gg = Math.min(255, Math.max(100, 240 * lightness));
      const bb = Math.min(255, Math.max(20, 95 * lightness));

      ctx.beginPath();
      ctx.moveTo(p00.x, p00.y);
      ctx.lineTo(p10.x, p10.y);
      ctx.lineTo(p11.x, p11.y);
      ctx.lineTo(p01.x, p01.y);
      ctx.closePath();
      ctx.fillStyle = `rgb(${rr|0},${gg|0},${bb|0})`;
      ctx.fill();
    }
  }

  // Fold lines for fabric texture
  ctx.lineWidth = 0.5;
  for (let r = 3; r < ROWS - 1; r += 4) {
    ctx.beginPath();
    for (let c = 0; c < COLS; c++) {
      const p = getPoint(c, r, t);
      c === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(200,190,40,0.06)';
    ctx.stroke();
  }
  for (let c = 3; c < COLS - 1; c += 5) {
    ctx.beginPath();
    for (let r = 0; r < ROWS; r++) {
      const p = getPoint(c, r, t);
      r === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(200,190,40,0.04)';
    ctx.stroke();
  }
}

// ─── Color overlay ───
const COL_YELLOW = [242,238,91];
const COL_BLUE   = [213,216,240];
const COL_LILAC  = [221,213,233];
const COL_WHITE  = [255,255,255];
const colorSequence = [COL_YELLOW, COL_BLUE, COL_YELLOW, COL_LILAC, COL_WHITE, COL_YELLOW];

function drawColorOverlay() {
  if (scrollTotal < 0.5) return;
  if (scrollTotal <= 1) {
    const alpha = easeInOutCubic((scrollTotal - 0.5) / 0.5);
    ctx.fillStyle = `rgba(${COL_YELLOW[0]},${COL_YELLOW[1]},${COL_YELLOW[2]},${alpha})`;
    ctx.fillRect(0, 0, W, H);
  } else {
    const st = Math.min(scrollTotal, 5.999);
    const sec = Math.floor(st);
    const prog = st - sec;
    const baseCol = colorSequence[Math.min(sec-1, 4)];
    ctx.fillStyle = `rgb(${baseCol[0]},${baseCol[1]},${baseCol[2]})`;
    ctx.fillRect(0, 0, W, H);
    if (prog > 0) {
      const nextCol = colorSequence[Math.min(sec, 5)];
      const wh = easeInOutCubic(prog) * H;
      ctx.fillStyle = `rgb(${nextCol[0]},${nextCol[1]},${nextCol[2]})`;
      ctx.fillRect(0, H - wh, W, wh);
    }
  }
}

// ─── UI ───
const titleEl = document.querySelector('.hero-title');
const hintEl = document.querySelector('.scroll-hint');
const scrollCopyEl = document.getElementById('scrollCopy');

// ─── Main loop ───
function frame(t) {
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  drawFlag(t);
  drawColorOverlay();

  // UI fades
  if (titleEl) titleEl.style.opacity = scrollProgress > 0.01 ? Math.max(0, 1 - scrollProgress*5) : 1;
  if (hintEl) {
    if (scrollProgress > 0.01) { hintEl.style.animation = 'none'; hintEl.style.opacity = Math.max(0, 0.35 - scrollProgress*3); }
    else { hintEl.style.animation = ''; hintEl.style.opacity = ''; }
  }
  if (scrollCopyEl) scrollCopyEl.style.opacity = scrollTotal > 0.7 ? Math.min(easeInOutCubic((scrollTotal-0.7)/0.3), 1) : 0;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
